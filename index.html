<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 媒体水印擦除工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .canvas-container {
            touch-action: none;
            position: relative;
            cursor: crosshair;
        }
        #maskCanvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            opacity: 0.5;
        }
        .loading-spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid #3b82f6;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">

    <div class="max-w-4xl mx-auto px-4 py-8">
        <!-- Header -->
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">AI 媒体水印擦除工具</h1>
            <p class="text-gray-600">快速遮盖或移除图片与视频中的 AI 生成水印</p>
        </header>

        <!-- Main Card -->
        <div class="bg-white rounded-2xl shadow-xl p-6 mb-8">
            
            <!-- Upload Section -->
            <div id="uploadArea" class="border-2 border-dashed border-gray-300 rounded-xl p-10 text-center transition-colors hover:border-blue-500 cursor-pointer mb-6">
                <input type="file" id="fileInput" class="hidden" accept="image/*,video/*">
                <div class="flex flex-col items-center">
                    <i data-lucide="upload-cloud" class="w-12 h-12 text-blue-500 mb-4"></i>
                    <p class="text-lg font-medium text-gray-700">点击或拖拽文件到这里</p>
                    <p class="text-sm text-gray-500 mt-2">支持 JPG, PNG, MP4 等格式</p>
                </div>
            </div>

            <!-- Workspace (Hidden by default) -->
            <div id="workspace" class="hidden">
                <div class="flex flex-col md:flex-row gap-4 mb-4 justify-between md:items-center">
                    <div class="flex gap-2 shrink-0">
                        <button id="resetBtn" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 flex items-center gap-2">
                            <i data-lucide="rotate-ccw" class="w-4 h-4"></i> 重置
                        </button>
                    </div>
                    <div id="imageControls" class="flex flex-wrap items-center justify-between gap-3 bg-gray-100 p-2 rounded-lg border border-gray-200 hidden flex-1">
                        <div class="flex flex-wrap items-center gap-3">
                            <div class="flex bg-white rounded-md border p-1 shadow-sm shrink-0">
                                <button id="toolRect" class="px-3 py-1 rounded bg-blue-100 text-blue-700 text-sm font-medium transition-colors">框选</button>
                                <button id="toolBrush" class="px-3 py-1 rounded text-gray-600 hover:bg-gray-50 text-sm font-medium transition-colors">画笔</button>
                            </div>
                            <div id="brushSettings" class="flex items-center gap-2 hidden shrink-0">
                                <label class="text-sm text-gray-600">大小:</label>
                                <input type="range" id="brushSize" min="5" max="80" value="20" class="w-20 accent-blue-600">
                            </div>
                            <div class="hidden md:block h-6 w-px bg-gray-300 mx-1"></div>
                            <button id="clearMaskBtn" class="text-sm text-red-500 hover:text-red-700 flex items-center gap-1 transition-colors shrink-0">
                                <i data-lucide="trash-2" class="w-4 h-4"></i> 清除蒙版
                            </button>
                        </div>
                        <button id="processImgBtn" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-bold shadow-md transition-all whitespace-nowrap">
                            立即擦除
                        </button>
                    </div>
                </div>

                <!-- Preview Display -->
                <div id="previewContainer" class="relative overflow-hidden bg-black rounded-lg flex justify-center items-center min-h-[300px]">
                    <!-- Image Canvas -->
                    <div id="imgWrapper" class="canvas-container hidden">
                        <canvas id="mainCanvas"></canvas>
                        <canvas id="maskCanvas"></canvas>
                    </div>
                    <!-- Video Player -->
                    <div id="videoWrapper" class="hidden w-full relative">
                        <video id="videoPlayer" controls class="w-full max-h-[600px]"></video>
                        <div id="videoOverlay" class="absolute bg-black/50 border border-dashed border-white cursor-move hidden" style="width: 100px; height: 40px; top: 80%; right: 10px;">
                            <div class="absolute -top-6 left-0 text-[10px] bg-black text-white px-1">水印遮罩</div>
                        </div>
                    </div>
                </div>

                <!-- Result Actions -->
                <div id="resultActions" class="mt-6 flex justify-center hidden">
                    <a id="downloadBtn" href="#" class="px-8 py-3 bg-green-600 text-white rounded-xl hover:bg-green-700 font-bold shadow-lg flex items-center gap-2">
                        <i data-lucide="download" class="w-5 h-5"></i> 下载处理后的文件
                    </a>
                </div>
            </div>
        </div>

        <!-- Instructions -->
        <section class="grid md:grid-cols-2 gap-6 text-sm text-gray-600">
            <div class="bg-blue-50 p-4 rounded-lg">
                <h3 class="font-bold text-blue-800 mb-2 flex items-center gap-2">
                    <i data-lucide="image" class="w-4 h-4"></i> 图片处理
                </h3>
                <p>选择“框选”或“画笔”工具标记水印位置。支持调整画笔大小，若涂抹错误可点击“清除蒙版”重置。点击“立即擦除”即可进行内容补全。</p>
            </div>
            <div class="bg-purple-50 p-4 rounded-lg">
                <h3 class="font-bold text-purple-800 mb-2 flex items-center gap-2">
                    <i data-lucide="video" class="w-4 h-4"></i> 视频处理
                </h3>
                <p>对于视频，您可以移动半透明遮罩覆盖水印，或通过下载后在播放器中调整比例实现裁剪效果。</p>
            </div>
        </section>

        <!-- Notification Toast -->
        <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 px-6 py-3 bg-gray-800 text-white rounded-full opacity-0 transition-opacity pointer-events-none">
            消息提示
        </div>
    </div>

    <script>
        // --- State & Config ---
        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('uploadArea');
        const workspace = document.getElementById('workspace');
        const mainCanvas = document.getElementById('mainCanvas');
        const maskCanvas = document.getElementById('maskCanvas');
        const ctx = mainCanvas.getContext('2d');
        const mctx = maskCanvas.getContext('2d');
        const videoPlayer = document.getElementById('videoPlayer');
        const videoWrapper = document.getElementById('videoWrapper');
        const imgWrapper = document.getElementById('imgWrapper');
        const videoOverlay = document.getElementById('videoOverlay');
        const toast = document.getElementById('toast');
        
        let currentFile = null;
        let isDrawing = false;
        let startX, startY;
        let selectionRect = { x: 0, y: 0, w: 0, h: 0 };
        let originalImage = null;
        
        // --- Tool State ---
        let currentTool = 'rect';
        let brushSize = 20;
        let brushBounds = { minX: Infinity, minY: Infinity, maxX: -Infinity, maxY: -Infinity };
        let hasMask = false;

        // Initialize Icons
        lucide.createIcons();

        // --- Utils ---
        function showToast(msg) {
            toast.innerText = msg;
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 3000);
        }

        // --- Tools UI Logic ---
        const toolRect = document.getElementById('toolRect');
        const toolBrush = document.getElementById('toolBrush');
        const brushSettings = document.getElementById('brushSettings');
        const brushSizeInput = document.getElementById('brushSize');
        const clearMaskBtn = document.getElementById('clearMaskBtn');

        if(toolRect) toolRect.addEventListener('click', () => setTool('rect'));
        if(toolBrush) toolBrush.addEventListener('click', () => setTool('brush'));
        if(brushSizeInput) brushSizeInput.addEventListener('input', (e) => brushSize = parseInt(e.target.value));
        if(clearMaskBtn) clearMaskBtn.addEventListener('click', clearMask);

        function setTool(tool) {
            currentTool = tool;
            if (tool === 'rect') {
                toolRect.classList.add('bg-blue-100', 'text-blue-700');
                toolRect.classList.remove('text-gray-600', 'hover:bg-gray-50');
                toolBrush.classList.remove('bg-blue-100', 'text-blue-700');
                toolBrush.classList.add('text-gray-600', 'hover:bg-gray-50');
                brushSettings.classList.add('hidden');
            } else {
                toolBrush.classList.add('bg-blue-100', 'text-blue-700');
                toolBrush.classList.remove('text-gray-600', 'hover:bg-gray-50');
                toolRect.classList.remove('bg-blue-100', 'text-blue-700');
                toolRect.classList.add('text-gray-600', 'hover:bg-gray-50');
                brushSettings.classList.remove('hidden');
            }
        }

        function clearMask() {
            mctx.clearRect(0, 0, maskCanvas.width, maskCanvas.height);
            selectionRect = { x: 0, y: 0, w: 0, h: 0 };
            brushBounds = { minX: Infinity, minY: Infinity, maxX: -Infinity, maxY: -Infinity };
            hasMask = false;
        }

        function updateBrushBounds(x, y) {
            brushBounds.minX = Math.min(brushBounds.minX, x - brushSize/2);
            brushBounds.minY = Math.min(brushBounds.minY, y - brushSize/2);
            brushBounds.maxX = Math.max(brushBounds.maxX, x + brushSize/2);
            brushBounds.maxY = Math.max(brushBounds.maxY, y + brushSize/2);
        }

        // --- File Handling ---
        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.classList.add('border-blue-500'); });
        uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('border-blue-500'));
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

        function handleFiles(files) {
            if (files.length === 0) return;
            const file = files[0];
            currentFile = file;
            
            uploadArea.classList.add('hidden');
            workspace.classList.remove('hidden');
            document.getElementById('resultActions').classList.add('hidden');

            if (file.type.startsWith('image/')) {
                setupImageMode(file);
            } else if (file.type.startsWith('video/')) {
                setupVideoMode(file);
            }
        }

        function setupImageMode(file) {
            imgWrapper.classList.remove('hidden');
            videoWrapper.classList.add('hidden');
            document.getElementById('imageControls').classList.remove('hidden');

            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    originalImage = img;
                    const maxWidth = workspace.offsetWidth;
                    const scale = Math.min(1, maxWidth / img.width);
                    
                    mainCanvas.width = img.width * scale;
                    mainCanvas.height = img.height * scale;
                    maskCanvas.width = mainCanvas.width;
                    maskCanvas.height = mainCanvas.height;
                    
                    ctx.drawImage(img, 0, 0, mainCanvas.width, mainCanvas.height);
                    clearMask();
                    showToast("图片已加载，请标记水印区域");
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function setupVideoMode(file) {
            imgWrapper.classList.add('hidden');
            videoWrapper.classList.remove('hidden');
            document.getElementById('imageControls').classList.add('hidden');
            videoOverlay.classList.remove('hidden');

            const url = URL.createObjectURL(file);
            videoPlayer.src = url;
            showToast("视频已加载，请移动遮罩覆盖水印");
        }

        // --- Drawing Logic ---
        imgWrapper.addEventListener('mousedown', startSelection);
        imgWrapper.addEventListener('mousemove', drawSelection);
        imgWrapper.addEventListener('mouseup', endSelection);
        imgWrapper.addEventListener('mouseleave', endSelection);

        function startSelection(e) {
            isDrawing = true;
            hasMask = true;
            const rect = mainCanvas.getBoundingClientRect();
            startX = e.clientX - rect.left;
            startY = e.clientY - rect.top;

            if (currentTool === 'brush') {
                mctx.beginPath();
                mctx.moveTo(startX, startY);
                mctx.lineCap = 'round';
                mctx.lineJoin = 'round';
                mctx.lineWidth = brushSize;
                mctx.strokeStyle = '#3b82f6';
                mctx.lineTo(startX, startY); // 立即绘制一个点
                mctx.stroke();
                updateBrushBounds(startX, startY);
            } else {
                clearMask(); // 开始新框选前清除旧蒙版
                isDrawing = true;
                hasMask = true;
            }
        }

        function drawSelection(e) {
            if (!isDrawing) return;
            const rect = mainCanvas.getBoundingClientRect();
            const currX = e.clientX - rect.left;
            const currY = e.clientY - rect.top;

            if (currentTool === 'rect') {
                selectionRect = {
                    x: Math.min(startX, currX),
                    y: Math.min(startY, currY),
                    w: Math.abs(currX - startX),
                    h: Math.abs(currY - startY)
                };

                mctx.clearRect(0, 0, maskCanvas.width, maskCanvas.height);
                mctx.fillStyle = '#3b82f6';
                mctx.fillRect(selectionRect.x, selectionRect.y, selectionRect.w, selectionRect.h);
            } else if (currentTool === 'brush') {
                mctx.lineTo(currX, currY);
                mctx.stroke();
                updateBrushBounds(currX, currY);
            }
        }

        function endSelection() {
            if (!isDrawing) return;
            isDrawing = false;
            
            if (currentTool === 'brush') {
                selectionRect = {
                    x: Math.max(0, brushBounds.minX),
                    y: Math.max(0, brushBounds.minY),
                    w: Math.min(mainCanvas.width - Math.max(0, brushBounds.minX), brushBounds.maxX - brushBounds.minX),
                    h: Math.min(mainCanvas.height - Math.max(0, brushBounds.minY), brushBounds.maxY - brushBounds.minY)
                };
            }
        }

        // --- Processing Logic (Simple Inpainting) ---
        document.getElementById('processImgBtn').addEventListener('click', () => {
            if (!hasMask || (currentTool === 'rect' && (selectionRect.w < 5 || selectionRect.h < 5))) {
                showToast("请先使用框选或画笔工具标记水印");
                return;
            }

            const btn = document.getElementById('processImgBtn');
            btn.disabled = true;
            btn.innerHTML = '<div class="loading-spinner inline-block"></div> 处理中...';

            setTimeout(() => {
                const { x, y, w, h } = selectionRect;
                
                // 扩展选区边缘以保证有足够的像素采样
                const safeX = Math.max(0, x - 2);
                const safeY = Math.max(0, y - 2);
                const safeW = Math.min(mainCanvas.width - safeX, w + 4);
                const safeH = Math.min(mainCanvas.height - safeY, h + 4);
                
                const imageData = ctx.getImageData(safeX, safeY, safeW, safeH);
                const data = imageData.data;

                // 简单的边缘拉伸填充算法
                for (let j = 0; j < safeH; j++) {
                    for (let i = 0; i < safeW; i++) {
                        const idx = (j * safeW + i) * 4;
                        
                        // 从选区上下边缘采样
                        const sourceX = safeX + i;
                        const sourceY = safeY - 2 > 0 ? safeY - 2 : safeY + safeH + 2;
                        
                        const finalSourceX = Math.min(Math.max(0, sourceX), mainCanvas.width - 1);
                        const finalSourceY = Math.min(Math.max(0, sourceY), mainCanvas.height - 1);
                        
                        const sourcePixel = ctx.getImageData(finalSourceX, finalSourceY, 1, 1).data;
                        
                        data[idx] = sourcePixel[0];
                        data[idx+1] = sourcePixel[1];
                        data[idx+2] = sourcePixel[2];
                        data[idx+3] = 255;
                    }
                }
                
                // 创建离屏 Canvas 用于处理补全图块
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = mainCanvas.width;
                tempCanvas.height = mainCanvas.height;
                const tctx = tempCanvas.getContext('2d');
                
                tctx.putImageData(imageData, safeX, safeY);
                
                // 应用模糊以平滑边缘
                tctx.filter = 'blur(4px)';
                tctx.drawImage(tempCanvas, safeX, safeY, safeW, safeH, safeX, safeY, safeW, safeH);
                tctx.filter = 'none';

                // 使用用户绘制的蒙版裁剪修补区域 (支持画笔的不规则形状)
                tctx.globalCompositeOperation = 'destination-in';
                tctx.drawImage(maskCanvas, 0, 0);
                
                // 将精确裁剪后的修补区域绘制回主画布
                ctx.globalCompositeOperation = 'source-over';
                ctx.drawImage(tempCanvas, 0, 0);

                clearMask();
                
                btn.disabled = false;
                btn.innerText = '立即擦除';
                
                const downloadBtn = document.getElementById('downloadBtn');
                downloadBtn.href = mainCanvas.toDataURL('image/png');
                downloadBtn.download = "no_watermark_" + currentFile.name;
                document.getElementById('resultActions').classList.remove('hidden');
                
                showToast("擦除完成！");
            }, 800);
        });

        // --- Video Overlay Movement ---
        let isDraggingOverlay = false;
        videoOverlay.addEventListener('mousedown', (e) => {
            isDraggingOverlay = true;
            videoOverlay.style.cursor = 'grabbing';
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDraggingOverlay) return;
            const rect = videoWrapper.getBoundingClientRect();
            let x = e.clientX - rect.left - (videoOverlay.offsetWidth / 2);
            let y = e.clientY - rect.top - (videoOverlay.offsetHeight / 2);

            // Bounds check
            x = Math.max(0, Math.min(x, rect.width - videoOverlay.offsetWidth));
            y = Math.max(0, Math.min(y, rect.height - videoOverlay.offsetHeight));

            videoOverlay.style.left = x + 'px';
            videoOverlay.style.top = y + 'px';
        });

        window.addEventListener('mouseup', () => {
            isDraggingOverlay = false;
            if(videoOverlay) videoOverlay.style.cursor = 'move';
        });

        // --- Reset ---
        document.getElementById('resetBtn').addEventListener('click', () => {
            location.reload();
        });

    </script>
</body>
</html>
